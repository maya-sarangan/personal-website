<nav class="pv3 ph3 ph4-ns" role="navigation">
  <div class="flex-l center items-center justify-between">
    <a href="{{ .Site.Home.RelPermalink }}" class="f3 fw2 hover-white white-90 dib no-underline">
      Home
    </a>
    <div class="flex-l items-center">
      {{ partials.Include "i18nlist.html" . }}
      {{ if .Site.Menus.main }}
        <ul class="{{ compare.Conditional (compare.Eq $.Site.Language.LanguageDirection "rtl") "pr0 ml3" "pl0 mr3" }}">
          {{ range .Site.Menus.main }}
          <li class="list f5 f4-ns fw4 dib {{ compare.Conditional (compare.Eq $.Site.Language.LanguageDirection "rtl") "pl3" "pr3" }}">
            <a class="hover-white white-90 no-underline" href="{{ .URL }}" title="{{ lang.Translate "pageTitle" . }}">
              {{ .Name }}
            </a>
          </li>
          {{ end }}
        </ul>
      {{ end }}
      {{ partials.IncludeCached "social/follow.html" . }}
      <div class="relative dib ml3">
        <input id="search-input" type="text" placeholder="Search posts..."
          class="input-reset ba b--white-40 bg-transparent white-90 pa2 f6 br2 w5" aria-label="Search posts">
        <ul id="search-results" class="list pl0 mt2 absolute right-0 bg-white shadow-1 br2 w6 z-999" style="display:none;"></ul>
      </div>
    </div>
  </div>
</nav>
<script>
(function() {
  let posts = [];
  fetch('{{ with urls.Parse .Site.BaseURL }}{{ .Path }}{{ end }}index.json')
    .then(r => r.json())
    .then(data => { posts = data; });

  const input = document.getElementById('search-input');
  const results = document.getElementById('search-results');

  input.addEventListener('input', function() {
    const q = this.value.toLowerCase().trim();
    results.innerHTML = '';
    if (!q) { results.style.display = 'none'; return; }
    const matches = posts.filter(p =>
      p.title.toLowerCase().includes(q) ||
      (p.tags && p.tags.some(t => t.toLowerCase().includes(q)))
    );
    if (matches.length === 0) { results.style.display = 'none'; return; }
    results.style.display = 'block';
    matches.forEach(p => {
      const li = document.createElement('li');
      li.className = 'pa2 bb b--light-gray';
      const tags = p.tags ? p.tags.map(t => '<span class="f7 gray ml1">#' + t + '</span>').join('') : '';
      li.innerHTML = '<a href="' + p.url + '" class="link dim dark-gray f6 fw6">' + p.title + '</a><br>' + tags;
      results.appendChild(li);
    });
  });

  document.addEventListener('click', function(e) {
    if (!e.target.closest('#search-input') && !e.target.closest('#search-results'))
      results.style.display = 'none';
  });
})();
</script>
